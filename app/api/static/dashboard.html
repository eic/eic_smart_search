<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EIC Smart Search — Analytics</title>
  <style>
    :root {
      --fg: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8fafc;
      --accent: #0ea5e9;
      --good: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      padding: 1rem 1.5rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header .controls { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    header select, header input {
      padding: 0.35rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      font: inherit;
      background: #fff;
    }
    main { padding: 1.25rem 1.5rem 3rem; max-width: 1400px; margin: 0 auto; }
    h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 2rem 0 0.75rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 0.6rem; }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 0.9rem;
    }
    .card .label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .card .value { font-size: 1.3rem; font-weight: 600; margin-top: 0.15rem; }
    .card .sub { color: var(--muted); font-size: 0.72rem; margin-top: 0.1rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
    thead th {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: left;
      color: var(--muted);
      padding: 0.55rem 0.7rem;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: 0.5rem 0.7rem;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: #f9fafb; }
    .pill {
      display: inline-block;
      padding: 0.05rem 0.45rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 500;
      background: #f1f5f9;
      color: #334155;
    }
    .pill.high { background: #d1fae5; color: #065f46; }
    .pill.medium { background: #fef3c7; color: #92400e; }
    .pill.low { background: #fee2e2; color: #991b1b; }
    .pill.none { background: #f1f5f9; color: #475569; }
    .pill.cache { background: #e0e7ff; color: #3730a3; }
    .mono { font-family: var(--mono); font-size: 0.85em; }
    .query { font-weight: 500; color: #111827; }
    .answer {
      color: #374151;
      white-space: pre-wrap;
      max-height: 5rem;
      overflow: hidden;
      position: relative;
      font-size: 0.85rem;
    }
    .answer.expanded { max-height: none; }
    .answer-toggle { color: var(--accent); cursor: pointer; font-size: 0.75rem; border: 0; background: none; padding: 0; margin-top: 0.25rem; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    .bar-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; padding: 0.2rem 0; }
    .bar-row .query-text { flex: 0 1 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #111827; }
    .bar-row .bar-track { flex: 1; height: 6px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
    .bar-row .bar-fill { height: 100%; background: var(--accent); }
    .bar-row .count { flex: 0 0 auto; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 1.5rem; text-align: right; }
    .chart { background: #fff; border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.8rem 1rem; }
    .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin: 0.5rem 0; }
    .chart-bars .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 0; }
    .chart-bars .col .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 1px; }
    .chart-bars .col .lbl { font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; transform: rotate(-30deg); transform-origin: top left; white-space: nowrap; }
    .loading { padding: 2rem; text-align: center; color: var(--muted); }
    .empty { padding: 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
    .num { font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
    code { font-family: var(--mono); font-size: 0.88em; background: #f3f4f6; padding: 0.05em 0.25em; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>EIC Smart Search — Analytics</h1>
    <div class="controls">
      <label>
        Window
        <select id="windowDays">
          <option value="1">Last day</option>
          <option value="7" selected>Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
        </select>
      </label>
      <label>
        Search
        <input id="searchBox" type="text" placeholder="filter queries…" style="min-width: 12rem;" />
      </label>
      <label style="display:flex; align-items:center; gap: 0.3rem;">
        <input type="checkbox" id="answeredOnly" />
        Answered only
      </label>
      <button id="refreshBtn" style="padding: 0.4rem 0.8rem; border: 1px solid var(--border); background: #fff; border-radius: 0.35rem; cursor: pointer;">Refresh</button>
    </div>
  </header>

  <main>
    <div id="summary" class="cards"><div class="loading">Loading…</div></div>

    <div class="two-col" style="margin-top: 2rem;">
      <div>
        <h2>Daily volume</h2>
        <div id="daily" class="chart"><div class="loading">Loading…</div></div>
      </div>
      <div>
        <h2>Top queries</h2>
        <div id="topQueries" class="chart"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <div class="two-col" style="margin-top: 1.25rem;">
      <div>
        <h2>Zero-result queries</h2>
        <div id="zeroResult" class="chart"><div class="loading">Loading…</div></div>
      </div>
      <div>
        <h2>Low-confidence queries</h2>
        <div id="lowConfidence" class="chart"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <h2>Recent queries + LLM answers</h2>
    <div id="recent"><div class="loading">Loading…</div></div>
  </main>

  <script>
    const fmtInt = (n) => (n == null ? "—" : Number(n).toLocaleString());
    const fmtMs = (n) => (n == null ? "—" : `${Math.round(n)} ms`);
    const fmtCost = (n) => (n == null ? "—" : `$${Number(n).toFixed(4)}`);
    const fmtTime = (iso) => {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    };
    const escape = (s) =>
      String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(url + " — HTTP " + r.status);
      return r.json();
    }

    function renderSummary(s) {
      const avgCost = s.answered_queries ? s.total_cost_usd / s.answered_queries : 0;
      const el = document.getElementById("summary");
      el.innerHTML = `
        <div class="card"><div class="label">Total queries</div><div class="value">${fmtInt(s.total_queries)}</div><div class="sub">${fmtInt(s.unique_queries)} unique</div></div>
        <div class="card"><div class="label">Answered</div><div class="value">${fmtInt(s.answered_queries)}</div><div class="sub">${fmtInt(s.zero_result_queries)} zero-result</div></div>
        <div class="card"><div class="label">Latency (p50)</div><div class="value">${fmtMs(s.p50_latency_ms)}</div><div class="sub">p95 ${fmtMs(s.p95_latency_ms)}</div></div>
        <div class="card"><div class="label">Avg latency</div><div class="value">${fmtMs(s.avg_latency_ms)}</div></div>
        <div class="card"><div class="label">LLM spend</div><div class="value">${fmtCost(s.total_cost_usd)}</div><div class="sub">${fmtCost(avgCost)}/answer</div></div>
        <div class="card"><div class="label">Tokens (in / out)</div><div class="value">${fmtInt(s.total_prompt_tokens)}</div><div class="sub">${fmtInt(s.total_completion_tokens)} completion</div></div>
      `;
    }

    function renderDaily(daily) {
      const el = document.getElementById("daily");
      if (!daily || !daily.length) { el.innerHTML = '<div class="empty">No data in this window.</div>'; return; }
      const max = Math.max(...daily.map((d) => d.queries || 0), 1);
      const cols = daily
        .map((d) => {
          const h = Math.max(2, (d.queries / max) * 100);
          const label = d.day ? d.day.slice(5) : "";
          return `<div class="col" title="${escape(d.day)} — ${d.queries} queries (avg ${fmtMs(d.avg_latency_ms)}, p95 ${fmtMs(d.p95_latency_ms)}, ${fmtCost(d.total_cost_usd)})"><div class="bar" style="height:${h}%"></div><div class="lbl">${label}</div></div>`;
        })
        .join("");
      el.innerHTML = `<div class="chart-bars">${cols}</div>`;
    }

    function renderBars(containerId, rows, metric) {
      const el = document.getElementById(containerId);
      if (!rows || !rows.length) { el.innerHTML = '<div class="empty">None in this window.</div>'; return; }
      const max = Math.max(...rows.map((r) => r[metric] || 0), 1);
      el.innerHTML = rows.map((r) => {
        const pct = Math.round(((r[metric] || 0) / max) * 100);
        return `<div class="bar-row"><span class="query-text" title="${escape(r.query)}">${escape(r.query)}</span><span class="bar-track"><span class="bar-fill" style="width:${pct}%"></span></span><span class="count">${r[metric]}</span></div>`;
      }).join("");
    }

    function renderRecent(items) {
      const el = document.getElementById("recent");
      if (!items || !items.length) { el.innerHTML = '<div class="empty">No queries in this window.</div>'; return; }
      const rows = items.map((it, idx) => {
        const conf = String(it.confidence || "none");
        const cacheBadge = it.cache_hit ? '<span class="pill cache">cache</span>' : "";
        const answered = it.answer_generated ? "" : '<span class="pill">preview</span>';
        const answerBlock = it.answer
          ? `<div class="answer" data-idx="${idx}">${escape(it.answer)}</div>${it.answer.length > 240 ? `<button class="answer-toggle" data-toggle="${idx}">Expand</button>` : ""}`
          : '<span class="pill none">no answer</span>';
        return `
          <tr>
            <td class="mono" style="white-space:nowrap">${escape(fmtTime(it.created_at))}</td>
            <td><div class="query">${escape(it.query)}</div>${cacheBadge} ${answered}</td>
            <td style="max-width: 520px;">${answerBlock}</td>
            <td class="num">${fmtMs(it.latency_ms)}</td>
            <td class="num"><span class="pill ${conf}">${conf}</span></td>
            <td class="num mono">${it.result_count}</td>
            <td class="num mono">${it.top_score != null ? it.top_score.toFixed(3) : "—"}</td>
            <td class="num mono">${it.prompt_tokens != null ? fmtInt(it.prompt_tokens) + " / " + fmtInt(it.completion_tokens) : "—"}</td>
            <td class="num mono">${fmtCost(it.cost_usd)}</td>
            <td class="mono" style="white-space:nowrap">${escape(it.generation_model || "")}</td>
          </tr>
        `;
      }).join("");
      el.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Query</th>
              <th>Answer</th>
              <th>Latency</th>
              <th>Conf.</th>
              <th>Hits</th>
              <th>Top</th>
              <th>Tokens (in/out)</th>
              <th>Cost</th>
              <th>Model</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      // Expand/collapse on answers
      el.querySelectorAll(".answer-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = btn.dataset.toggle;
          const a = el.querySelector(`.answer[data-idx="${idx}"]`);
          a.classList.toggle("expanded");
          btn.textContent = a.classList.contains("expanded") ? "Collapse" : "Expand";
        });
      });
    }

    async function load() {
      const wd = document.getElementById("windowDays").value;
      const search = document.getElementById("searchBox").value.trim();
      const answeredOnly = document.getElementById("answeredOnly").checked;

      for (const id of ["summary", "daily", "topQueries", "zeroResult", "lowConfidence", "recent"]) {
        document.getElementById(id).innerHTML = '<div class="loading">Loading…</div>';
      }

      try {
        const [analytics, recent] = await Promise.all([
          fetchJson(`/admin/analytics?window_days=${wd}&limit=15`),
          fetchJson(`/admin/recent?window_days=${wd}&limit=100${search ? `&search=${encodeURIComponent(search)}` : ""}${answeredOnly ? "&answered_only=true" : ""}`),
        ]);

        renderSummary(analytics.summary);
        renderDaily(analytics.daily);
        renderBars("topQueries", analytics.top_queries, "count");
        renderBars("zeroResult", analytics.zero_result_queries, "count");
        renderBars("lowConfidence", analytics.low_confidence_queries, "count");
        renderRecent(recent.items);
      } catch (err) {
        document.getElementById("summary").innerHTML = `<div class="card" style="grid-column: 1 / -1; color: var(--bad);">Load failed: ${escape(err.message || err)}</div>`;
      }
    }

    document.getElementById("windowDays").addEventListener("change", load);
    document.getElementById("answeredOnly").addEventListener("change", load);
    document.getElementById("refreshBtn").addEventListener("click", load);
    let searchTimer = null;
    document.getElementById("searchBox").addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(load, 300);
    });

    load();
  </script>
</body>
</html>
